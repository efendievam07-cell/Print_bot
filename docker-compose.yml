services:
  db:
    image: postgres:16-alpine
    container_name: optop-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: optop
      POSTGRES_PASSWORD: optop
      POSTGRES_DB: optop
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U optop -d optop"]
      interval: 5s
      timeout: 5s
      retries: 5

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: optop-bot
    restart: unless-stopped
    # ВНИМАНИЕ: НЕ ставить network_mode: "host" — это ломает DNS-алиас 'db'.
    # Бот и БД общаются по имени сервиса только внутри bridge-сети compose.
    depends_on:
      db:
        condition: service_healthy
    environment:
      DB_URL: postgresql+asyncpg://optop:optop@db:5432/optop
      BOT_TOKEN: ${BOT_TOKEN}
      API_SECRET_TOKEN: ${API_SECRET_TOKEN}
      CONTROL_CHAT_ID: ${CONTROL_CHAT_ID}
      ADMIN_ID: ${ADMIN_ID}
      TELEGRAM_PROXY: ${TELEGRAM_PROXY}
    # Явный DNS — страховка на случай локального резолва имён внутри контейнера.
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./data:/app/data
    ports:
      - "8000:8000"
    command: ["python", "-m", "bot.main"]

networks:
  default:
    driver: bridge
    driver_opts:
      # Подгоняем MTU bridge под MTU физического интерфейса VPS.
      # Лечит молчаливый таймаут TLS-handshake через прокси (drop крупных пакетов).
      # Узнать MTU хоста: `ip route get 8.8.8.8` → затем `ip link show <iface>`.
      # Поставь значение <= MTU хоста (1400 — безопасный дефолт для VPS).
      com.docker.network.driver.mtu: "1400"

volumes:
  postgres_data:
